services:
  odoo-agent:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      - PORT=8000
    volumes:
      # I dati generati (trascrizioni, indice) persistono tra riavvii e aggiornamenti
      - odoo_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s   # Dà tempo alla pipeline di girare al primo avvio

volumes:
  odoo_data:
