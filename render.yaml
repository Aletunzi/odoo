services:
  - type: web
    name: odoo-agent
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false      # Inserita manualmente nel pannello Render
    disk:
      name: odoo-data
      mountPath: /app/data    # Dati persistenti tra un deploy e l'altro
      sizeGB: 5
    healthCheckPath: /api/status
