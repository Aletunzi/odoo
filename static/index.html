<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Odoo Tutorial Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --odoo: #714B67;
      --odoo-light: #f0e8ee;
      --odoo-dark: #5a3a52;
      --sidebar-bg: #1c1c1e;
      --sidebar-text: #e5e5e5;
      --sidebar-hover: #2c2c2e;
      --sidebar-border: #3a3a3c;
      --bg: #ffffff;
      --surface: #f7f7f8;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --text-muted: #6b7280;
      --user-bg: #714B67;
      --user-text: #ffffff;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    }

    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; min-width: 260px; background: var(--sidebar-bg);
      display: flex; flex-direction: column; overflow: hidden;
      border-right: 1px solid var(--sidebar-border);
    }
    .sidebar-header {
      padding: 20px 16px 12px; border-bottom: 1px solid var(--sidebar-border);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .logo-icon {
      width: 32px; height: 32px; background: var(--odoo); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; fill: white; }
    .logo-name { color: #fff; font-weight: 600; font-size: 15px; }
    .logo-sub { color: var(--text-muted); font-size: 11px; }
    .btn-new {
      width: 100%; padding: 8px 12px; background: var(--odoo);
      color: white; border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; display: flex; align-items: center;
      gap: 6px; justify-content: center; transition: background .15s;
    }
    .btn-new:hover { background: var(--odoo-dark); }

    .sidebar-history { flex: 1; overflow-y: auto; padding: 8px; }
    .history-label {
      color: var(--text-muted); font-size: 11px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; padding: 8px 8px 4px;
    }
    .history-item {
      padding: 8px 10px; border-radius: 8px; cursor: pointer; color: var(--sidebar-text);
      font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background .12s;
    }
    .history-item:hover { background: var(--sidebar-hover); }
    .history-item.active { background: var(--sidebar-hover); }

    .sidebar-footer {
      padding: 12px 16px; border-top: 1px solid var(--sidebar-border);
      color: var(--text-muted); font-size: 12px;
    }
    .status-dot {
      display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; margin-right: 5px; vertical-align: middle;
    }
    .status-dot.offline { background: #ef4444; }
    .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    .topbar {
      padding: 0 24px; height: 56px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bg);
    }
    .topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .topbar-actions { display: flex; gap: 8px; }
    .btn-icon {
      width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px;
      background: none; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: var(--text-muted); transition: all .12s;
    }
    .btn-icon:hover { background: var(--surface); color: var(--text); }

    /* ── Chat ── */
    .chat-wrap { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .chat-inner { max-width: 780px; margin: 0 auto; padding: 32px 24px 16px; }

    /* Welcome screen */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 16px; text-align: center;
    }
    .welcome-icon {
      width: 64px; height: 64px; background: var(--odoo-light); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .welcome-icon svg { width: 32px; height: 32px; fill: var(--odoo); }
    .welcome h1 { font-size: 24px; font-weight: 700; color: var(--text); }
    .welcome p { color: var(--text-muted); font-size: 15px; max-width: 400px; line-height: 1.6; }
    .suggestions { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; width: 100%; max-width: 480px; }
    .suggestion {
      padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer; text-align: left; font-size: 14px;
      color: var(--text); transition: all .12s; line-height: 1.4;
    }
    .suggestion:hover { border-color: var(--odoo); background: var(--odoo-light); }

    /* Messages */
    .msg { display: flex; gap: 12px; margin-bottom: 28px; animation: fadeIn .2s ease; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
      font-weight: 600; margin-top: 2px;
    }
    .msg.user .msg-avatar { background: var(--odoo); color: white; }
    .msg.assistant .msg-avatar { background: var(--surface); border: 1px solid var(--border); color: var(--odoo); }
    .msg-body { max-width: 85%; }
    .msg-bubble {
      padding: 12px 16px; border-radius: var(--radius); line-height: 1.65;
      font-size: 14.5px;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px;
    }
    .msg.assistant .msg-bubble {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside bubbles */
    .msg-bubble p { margin-bottom: 10px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .msg-bubble li { margin-bottom: 4px; }
    .msg-bubble code {
      background: rgba(0,0,0,.07); padding: 1px 5px; border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    }
    .msg.user .msg-bubble code { background: rgba(255,255,255,.2); }
    .msg-bubble pre {
      background: rgba(0,0,0,.06); padding: 12px; border-radius: 8px; overflow-x: auto;
      margin: 8px 0;
    }
    .msg-bubble pre code { background: none; padding: 0; }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      font-weight: 600; margin-bottom: 6px; margin-top: 12px;
    }
    .msg-bubble h1:first-child, .msg-bubble h2:first-child, .msg-bubble h3:first-child { margin-top: 0; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--border); padding-left: 12px; color: var(--text-muted);
    }

    /* Sources */
    .sources {
      margin-top: 8px; padding: 8px 0;
    }
    .sources-toggle {
      font-size: 12px; color: var(--text-muted); cursor: pointer; display: flex;
      align-items: center; gap: 4px; user-select: none; transition: color .12s;
    }
    .sources-toggle:hover { color: var(--odoo); }
    .sources-toggle svg { width: 12px; height: 12px; transition: transform .15s; }
    .sources-toggle.open svg { transform: rotate(90deg); }
    .sources-list { display: none; margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
    .sources-list.hidden { display: none; }
    .source-item {
      display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted);
    }
    .source-item a {
      color: var(--odoo); text-decoration: none; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;
    }
    .source-item a:hover { text-decoration: underline; }
    .source-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--odoo); flex-shrink: 0; }

    /* Cursor typing */
    .cursor { display: inline-block; width: 2px; height: 16px; background: var(--text); animation: blink .8s step-end infinite; vertical-align: text-bottom; margin-left: 1px; }
    .msg.user .cursor { background: white; }

    /* Thinking indicator */
    .thinking {
      display: flex; gap: 5px; align-items: center; padding: 12px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      border-bottom-left-radius: 4px; width: fit-content;
    }
    .thinking span {
      width: 7px; height: 7px; background: var(--text-muted); border-radius: 50%;
      animation: bounce .8s ease infinite;
    }
    .thinking span:nth-child(2) { animation-delay: .15s; }
    .thinking span:nth-child(3) { animation-delay: .3s; }

    /* ── Input area ── */
    .input-wrap {
      padding: 16px 24px 24px; background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .input-inner { max-width: 780px; margin: 0 auto; }
    .input-box {
      display: flex; align-items: flex-end; gap: 10px; padding: 10px 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-box:focus-within {
      border-color: var(--odoo); box-shadow: 0 0 0 3px rgba(113,75,103,.12);
    }
    textarea {
      flex: 1; border: none; background: none; resize: none; outline: none;
      font-size: 14.5px; color: var(--text); line-height: 1.5; max-height: 200px;
      min-height: 24px; overflow-y: auto; font-family: inherit;
    }
    textarea::placeholder { color: var(--text-muted); }
    .btn-send {
      width: 36px; height: 36px; border-radius: 9px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      background: var(--odoo); color: white; transition: all .12s;
    }
    .btn-send:hover:not(:disabled) { background: var(--odoo-dark); }
    .btn-send:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; }
    .input-hint { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 8px; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-7px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .chat-inner { padding: 16px 12px; }
      .input-wrap { padding: 12px 12px 16px; }
      .msg-body { max-width: 95%; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <div>
          <div class="logo-name">Odoo Agent</div>
          <div class="logo-sub">Tutorial Q&amp;A</div>
        </div>
      </div>
      <button class="btn-new" onclick="newConversation()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="white"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Nuova conversazione
      </button>
    </div>

    <div class="sidebar-history" id="historyList">
      <div class="history-label">Cronologia</div>
      <!-- popolato via JS -->
    </div>

    <div class="sidebar-footer">
      <span class="status-dot loading" id="statusDot"></span>
      <span id="statusText">Caricamento...</span>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="convTitle">Tutorial Odoo</div>
      <div class="topbar-actions">
        <button class="btn-icon" title="Nuova chat" onclick="newConversation()">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </button>
      </div>
    </div>

    <div class="chat-wrap" id="chatWrap">
      <div class="chat-inner" id="chatInner">
        <div class="welcome" id="welcome">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
          </div>
          <h1>Cosa vuoi sapere su Odoo?</h1>
          <p>Fai domande sui tutorial ufficiali Odoo. L'agente cerca nelle trascrizioni e risponde con il contesto preciso.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="useSuggestion(this)">Come si configura il piano dei conti in Odoo?</button>
            <button class="suggestion" onclick="useSuggestion(this)">Come funziona la gestione del magazzino e le ubicazioni?</button>
            <button class="suggestion" onclick="useSuggestion(this)">Come si crea e gestisce un ordine di vendita?</button>
            <button class="suggestion" onclick="useSuggestion(this)">Come si configura la produzione (MRP) in Odoo?</button>
          </div>
        </div>
      </div>
    </div>

    <div class="input-wrap">
      <div class="input-inner">
        <div class="input-box">
          <textarea
            id="msgInput"
            placeholder="Chiedi qualcosa sui tutorial Odoo..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled title="Invia">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">Invio per inviare · Shift+Invio per andare a capo</div>
      </div>
    </div>
  </div>

</div>

<script>
// ──────────────────────────────────────────────────────────
// Stato
// ──────────────────────────────────────────────────────────
let history = [];         // [{role, content}] messaggi puliti
let isStreaming = false;
let conversations = [];   // [{id, title, history}]
let currentConvId = null;

// ──────────────────────────────────────────────────────────
// Inizializzazione
// ──────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    const btn = document.getElementById('sendBtn');
    if (data.ready) {
      dot.className = 'status-dot';
      txt.textContent = 'Pronto';
      btn.disabled = false;
    } else {
      dot.className = 'status-dot offline';
      txt.textContent = 'DB non trovato';
    }
  } catch {
    document.getElementById('statusDot').className = 'status-dot offline';
    document.getElementById('statusText').textContent = 'Server non raggiungibile';
  }
}
checkStatus();

// ──────────────────────────────────────────────────────────
// Input helpers
// ──────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function useSuggestion(btn) {
  document.getElementById('msgInput').value = btn.textContent.trim();
  autoResize(document.getElementById('msgInput'));
  sendMessage();
}

// ──────────────────────────────────────────────────────────
// Render helpers
// ──────────────────────────────────────────────────────────
function renderMarkdown(text) {
  return marked.parse(text, { breaks: true, gfm: true });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const wrap = document.getElementById('chatWrap');
  wrap.scrollTop = wrap.scrollHeight;
}

// ──────────────────────────────────────────────────────────
// Messaggi UI
// ──────────────────────────────────────────────────────────
function appendUserMsg(text) {
  document.getElementById('welcome')?.remove();
  const chat = document.getElementById('chatInner');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `
    <div class="msg-avatar">Tu</div>
    <div class="msg-body">
      <div class="msg-bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div>
    </div>`;
  chat.appendChild(el);
  scrollBottom();
}

function appendThinking() {
  document.getElementById('welcome')?.remove();
  const chat = document.getElementById('chatInner');
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.id = 'thinkingMsg';
  el.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="thinking"><span></span><span></span><span></span></div>
    </div>`;
  chat.appendChild(el);
  scrollBottom();
  return el;
}

function replaceThinkingWithBubble() {
  const th = document.getElementById('thinkingMsg');
  if (!th) return null;
  const chat = document.getElementById('chatInner');
  const el = document.createElement('div');
  el.className = 'msg assistant';
  el.id = 'streamingMsg';
  el.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-body">
      <div class="msg-bubble" id="streamBubble"></div>
      <div class="sources" id="streamSources" style="display:none"></div>
    </div>`;
  th.replaceWith(el);
  return el;
}

function renderSources(sources) {
  const container = document.getElementById('streamSources');
  if (!container || !sources.length) return;
  container.style.display = '';
  const listId = 'srcList_' + Date.now();
  container.innerHTML = `
    <div class="sources-toggle open" onclick="toggleSources(this, '${listId}')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      ${sources.length} fonte${sources.length > 1 ? 'i' : ''}
    </div>
    <div class="sources-list" id="${listId}">
      ${sources.map(s => `
        <div class="source-item">
          <div class="source-dot"></div>
          ${s.url
            ? `<a href="${escapeHtml(s.url)}" target="_blank" rel="noopener">${escapeHtml(s.title || s.url)}</a>`
            : `<span>${escapeHtml(s.title || 'Tutorial Odoo')}</span>`
          }
        </div>`).join('')}
    </div>`;
}

function toggleSources(btn, listId) {
  const list = document.getElementById(listId);
  const isOpen = !list.classList.contains('hidden');
  list.classList.toggle('hidden', isOpen);
  btn.classList.toggle('open', !isOpen);
}

// ──────────────────────────────────────────────────────────
// Stream
// ──────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;
  isStreaming = true;

  appendUserMsg(text);
  appendThinking();

  let fullAnswer = '';
  let msgReplaced = false;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // ultima riga potenzialmente incompleta

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;

        let evt;
        try { evt = JSON.parse(raw); } catch { continue; }

        if (evt.type === 'sources') {
          if (!msgReplaced) { replaceThinkingWithBubble(); msgReplaced = true; }
          renderSources(evt.data);

        } else if (evt.type === 'text') {
          if (!msgReplaced) { replaceThinkingWithBubble(); msgReplaced = true; }
          fullAnswer += evt.data;
          const bubble = document.getElementById('streamBubble');
          if (bubble) {
            bubble.innerHTML = renderMarkdown(fullAnswer) + '<span class="cursor"></span>';
            scrollBottom();
          }

        } else if (evt.type === 'done') {
          const bubble = document.getElementById('streamBubble');
          if (bubble) bubble.innerHTML = renderMarkdown(fullAnswer);
          // Rimuove id temporanei
          document.getElementById('streamingMsg')?.removeAttribute('id');
          document.getElementById('streamBubble')?.removeAttribute('id');
          document.getElementById('streamSources')?.removeAttribute('id');

          // Aggiorna history con messaggi puliti
          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: fullAnswer });

          // Salva in cronologia sidebar
          saveConversation(text);
          scrollBottom();

        } else if (evt.type === 'error') {
          if (!msgReplaced) { replaceThinkingWithBubble(); msgReplaced = true; }
          const bubble = document.getElementById('streamBubble');
          if (bubble) bubble.innerHTML = `<span style="color:#ef4444">⚠ ${escapeHtml(evt.data)}</span>`;
        }
      }
    }
  } catch (err) {
    document.getElementById('thinkingMsg')?.remove();
    const chat = document.getElementById('chatInner');
    const el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = `<div class="msg-avatar">AI</div><div class="msg-body"><div class="msg-bubble" style="color:#ef4444">⚠ Errore di connessione: ${escapeHtml(err.message)}</div></div>`;
    chat.appendChild(el);
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('msgInput').focus();
  }
}

// ──────────────────────────────────────────────────────────
// Conversazioni
// ──────────────────────────────────────────────────────────
function saveConversation(firstMessage) {
  if (!currentConvId) {
    currentConvId = Date.now().toString();
    const title = firstMessage.slice(0, 45) + (firstMessage.length > 45 ? '…' : '');
    conversations.unshift({ id: currentConvId, title, messages: [] });
    document.getElementById('convTitle').textContent = title;
    renderHistory();
  }
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const items = conversations.map(c => `
    <div class="history-item ${c.id === currentConvId ? 'active' : ''}"
         onclick="loadConversation('${c.id}')">
      ${escapeHtml(c.title)}
    </div>`).join('');
  list.innerHTML = `<div class="history-label">Cronologia</div>${items}`;
}

function newConversation() {
  history = [];
  currentConvId = null;
  document.getElementById('chatInner').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
      </div>
      <h1>Cosa vuoi sapere su Odoo?</h1>
      <p>Fai domande sui tutorial ufficiali Odoo. L'agente cerca nelle trascrizioni e risponde con il contesto preciso.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="useSuggestion(this)">Come si configura il piano dei conti in Odoo?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Come funziona la gestione del magazzino e le ubicazioni?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Come si crea e gestisce un ordine di vendita?</button>
        <button class="suggestion" onclick="useSuggestion(this)">Come si configura la produzione (MRP) in Odoo?</button>
      </div>
    </div>`;
  document.getElementById('convTitle').textContent = 'Tutorial Odoo';
  renderHistory();
  document.getElementById('msgInput').focus();
}

function loadConversation(id) {
  // Segna attiva nella sidebar
  currentConvId = id;
  renderHistory();
  // (storia in memoria: non persistiamo per semplicità)
}
</script>
